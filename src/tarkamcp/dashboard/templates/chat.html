{% extends "base.html" %}
{% block title %}Chat · TarkaMCP{% endblock %}
{% block body_class %}chat-page{% endblock %}
{% block head %}
<meta name="csrf-token" content="{{ csrf_token }}">
{% endblock %}
{% block body %}
<svg class="icon-sprite" xmlns="http://www.w3.org/2000/svg" style="display:none">
  <symbol id="i-plus" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></symbol>
  <symbol id="i-chev-r" viewBox="0 0 24 24"><path d="m9 6 6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></symbol>
  <symbol id="i-chev-d" viewBox="0 0 24 24"><path d="m6 9 6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></symbol>
  <symbol id="i-send" viewBox="0 0 24 24"><path d="M12 19V5M5 12l7-7 7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></symbol>
  <symbol id="i-more" viewBox="0 0 24 24"><circle cx="5" cy="12" r="1.5" fill="currentColor"/><circle cx="12" cy="12" r="1.5" fill="currentColor"/><circle cx="19" cy="12" r="1.5" fill="currentColor"/></symbol>
  <symbol id="i-menu" viewBox="0 0 24 24"><path d="M4 7h16M4 12h16M4 17h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></symbol>
  <symbol id="i-check" viewBox="0 0 24 24"><path d="M5 12l5 5L20 7" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/></symbol>
  <symbol id="i-warn" viewBox="0 0 24 24"><path d="M12 3 2 21h20L12 3zm0 6v5m0 3v.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></symbol>
  <symbol id="i-spin" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2" fill="none" opacity="0.2"/><path d="M21 12a9 9 0 0 0-9-9" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/></symbol>
  <symbol id="i-stop" viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" rx="1.5" fill="currentColor"/></symbol>
  <symbol id="i-edit" viewBox="0 0 24 24"><path d="M4 20h4L20 8l-4-4L4 16v4zm10-14 4 4" stroke="currentColor" stroke-width="2" stroke-linejoin="round" fill="none"/></symbol>
  <symbol id="i-trash" viewBox="0 0 24 24"><path d="M4 7h16M10 11v6M14 11v6M6 7l1 13h10l1-13M9 7V4h6v3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></symbol>
  <symbol id="i-logout" viewBox="0 0 24 24"><path d="M15 4h3a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2h-3M10 17l5-5-5-5M15 12H4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></symbol>
  <symbol id="i-copy" viewBox="0 0 24 24"><rect x="9" y="9" width="11" height="11" rx="1.5" stroke="currentColor" stroke-width="2" fill="none"/><path d="M5 15H4a1 1 0 0 1-1-1V5a1 1 0 0 1 1-1h9a1 1 0 0 1 1 1v1" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/></symbol>
  <symbol id="i-regen" viewBox="0 0 24 24"><path d="M20 4v6h-6M4 20v-6h6M20 10a8 8 0 0 0-14.47-3M4 14a8 8 0 0 0 14.47 3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></symbol>
  <symbol id="i-x" viewBox="0 0 24 24"><path d="M6 6l12 12M6 18 18 6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></symbol>
</svg>

<div class="chat-root"
     data-client-id="{{ client_id }}"
     data-client-name="{{ client_name }}"
     data-default-model="{{ default_model }}"
     data-default-effort="{{ default_effort }}"
     data-valid-models='{{ valid_models|tojson }}'
     data-valid-efforts='{{ valid_efforts|tojson }}'>

  <aside class="sidebar" id="sidebar" aria-label="Conversations">
    <div class="sidebar-head">
      <div class="brand">TarkaMCP</div>
      <button id="close-sidebar" class="icon-btn mobile-only" aria-label="Fermer le menu">
        <svg width="20" height="20"><use href="#i-x"/></svg>
      </button>
    </div>

    <button id="new-chat" class="primary">
      <svg width="16" height="16"><use href="#i-plus"/></svg>
      <span>Nouveau chat</span>
    </button>

    <a href="/app/tokens" class="sidebar-cta">
      <div class="sidebar-cta-icon">
        <svg width="18" height="18"><use href="#i-copy"/></svg>
      </div>
      <div class="sidebar-cta-text">
        <span class="sidebar-cta-title">Tokens API</span>
        <span class="sidebar-cta-sub">Brancher Gemini, ChatGPT, Claude Desktop…</span>
      </div>
      <svg class="sidebar-cta-chev" width="14" height="14" aria-hidden="true"><use href="#i-chev-r"/></svg>
    </a>

    <nav id="conv-list" aria-label="Liste des conversations"></nav>

    <div class="sidebar-foot">
      <div class="client-chip">
        <span class="muted small">Session</span>
        <span class="client-name">{{ client_name }}</span>
      </div>
      <form method="POST" action="/app/logout">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <button type="submit" class="ghost full">
          <svg width="16" height="16"><use href="#i-logout"/></svg>
          <span>Déconnexion</span>
        </button>
      </form>
    </div>
  </aside>

  <main class="main">
    <header class="topbar">
      <button id="open-sidebar" class="icon-btn mobile-only" aria-label="Ouvrir le menu">
        <svg width="22" height="22"><use href="#i-menu"/></svg>
      </button>
      <h1 id="conv-title" class="title">Nouveau chat</h1>
      <div class="topbar-actions">
        <button id="conv-menu" class="icon-btn" aria-label="Options">
          <svg width="20" height="20"><use href="#i-more"/></svg>
        </button>
      </div>
    </header>

    <section id="messages" class="messages" aria-live="polite"></section>

    <footer class="composer">
      <div class="composer-options">
        <label>
          <span class="label">Modèle</span>
          <select id="select-model">
            {% for m in valid_models %}
              <option value="{{ m }}" {% if m == default_model %}selected{% endif %}>{{ m }}</option>
            {% endfor %}
          </select>
        </label>
        <label>
          <span class="label">Effort</span>
          <select id="select-effort">
            {% for e in valid_efforts %}
              <option value="{{ e }}" {% if e == default_effort %}selected{% endif %}>{{ e }}</option>
            {% endfor %}
          </select>
        </label>
      </div>
      <div class="composer-row">
        <textarea id="composer-input" rows="1"
                  placeholder="Envoyer un message à TarkaMCP…"
                  aria-label="Message"></textarea>
        <button id="composer-send" class="primary icon-btn" aria-label="Envoyer">
          <svg width="18" height="18"><use href="#i-send"/></svg>
        </button>
      </div>
    </footer>
  </main>

  <div id="sidebar-backdrop" class="backdrop" hidden></div>
</div>

<script type="module" src="/app/static/chat.js"></script>
{% endblock %}
